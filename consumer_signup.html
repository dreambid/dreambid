<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DreamBid - 소비자 가입</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
.card { background: #fff; border-radius: 16px; border: 1px solid #e5e5e5; width: 100%; max-width: 340px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
.header { padding: 28px 24px 20px; border-bottom: 1px solid #f0f0f0; text-align: center; }
.header h1 { font-size: 22px; font-weight: 600; color: #1a1a1a; margin-bottom: 4px; }
.header p { font-size: 13px; color: #888; }
.body { padding: 28px 24px; }
.title { font-size: 15px; font-weight: 600; text-align: center; margin-bottom: 20px; color: #1a1a1a; }
.btn { width: 100%; padding: 13px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #e5e5e5; font-size: 15px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: opacity 0.2s; }
.btn:hover { opacity: 0.85; }
.btn-kakao { background: #FEE500; color: #3C1E1E; border-color: #FEE500; }
.btn-naver { background: #03C75A; color: #fff; border-color: #03C75A; }
.btn-google { background: #fff; color: #1a1a1a; }
.btn-apple { background: #fff; color: #1a1a1a; }
.notice { font-size: 11px; color: #aaa; text-align: center; margin-top: 20px; line-height: 1.6; }
.icon { font-size: 18px; }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <h1>DreamBid</h1>
    <p>더 싸게, 더 안전하게</p>
  </div>
  <div class="body">
    <p class="title">1초 만에 시작하기</p>
    <button class="btn btn-kakao">
      <span class="icon">💬</span> 카카오로 시작하기
    </button>
    <button class="btn btn-naver">
      <span class="icon">🍃</span> 네이버로 시작하기
    </button>
    <button class="btn btn-google">
      <span class="icon">🔍</span> 구글로 시작하기
    </button>
    <button class="btn btn-apple">
      <span class="icon">🍎</span> 애플로 시작하기
    </button>
    <p class="notice">가입 즉시 서비스 이용 가능<br>추가 입력 없음</p>
  </div>
</div>
</body>
</html>
